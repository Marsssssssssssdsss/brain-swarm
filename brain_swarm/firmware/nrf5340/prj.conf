# NeuroResonator nRF5340 - Zephyr Project Configuration
#
# CPU & Power
CONFIG_SOC_NRF5340_CPUAPP=y
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=128000000
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ISR_STACK_SIZE=4096
CONFIG_SLEEP=y
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="NeuroResonator"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_RX_BUF_LEN=64
CONFIG_BT_TX_BUF_COUNT=6
CONFIG_BT_BUF_ACL_TX_SIZE=64

# SPI
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y
CONFIG_SPI_DMA=y
CONFIG_SPI_NRFX=y
CONFIG_NRFX_SPIM3=y

# I2C
CONFIG_I2C=y

# ADC
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# UART
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SERIAL=y

# Sensor subsystem
CONFIG_SENSOR=y
CONFIG_SENSOR_LOG_LEVEL_WRN=y

# Storage
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FCB=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_LEVEL_DBG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_UART_SYSTREAM_ENABLE=n

# CMSIS-DSP
CONFIG_CMSIS_DSP=y

# Kernel
CONFIG_MULTITHREADING=y
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=10
CONFIG_TIMESLICE_PRIORITY=0

# Heap
CONFIG_HEAP_MEM_POOL_SIZE=4096

# GPIO
CONFIG_GPIO=y

# CRC
CONFIG_CRC=y

# Ring buffer
CONFIG_RING_BUFFER=y
